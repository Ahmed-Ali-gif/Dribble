<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dribbble Clone</title>
  <link rel="stylesheet" href="dribble.css"/>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>

<body>

<!-- NAV -->
<header>
  <nav class="nav container">
    <div class="nav-left">
      <img src="dribble-logo.png" class="logo"/>

      <ul class="nav-links">
        <li>Explore</li>
        <li>Hire Talent</li>
        <li>Get Hired</li>
        <li>Community</li>
      </ul>
    </div>

    <div class="nav-btns">
      <button class="btn light">Signup</button>
      <button class="btn dark">Login</button>
    </div>
  </nav>
</header>

<!-- HERO -->
<section class="hero container">

  <div class="hero-text">
    <h1>Discover the World’s Top Designers</h1>

    <p>
      Explore work from the most talented designers ready
      to take on your next project.
    </p>

    <div class="hero-tabs">
      <button class="active">Shots</button>
      <button>Designers</button>
      <button>Services</button>
    </div>

    <div class="search-box">
      <input type="text" placeholder="What are you looking for?" />
      <i class="fa fa-search"></i>
    </div>

    <div class="tags">
      <span>Popular:</span>
      <button>Dashboard</button>
      <button>Landing Page</button>
      <button>E-commerce</button>
      <button>Logo</button>
    </div>
  </div>

  <video autoplay muted loop>
    <source src="https://cdn.dribbble.com/uploads/67244/original/e409cf3e68ef795fe27c954d7e45a692.mp4"/>
  </video>

</section>

<!-- MAIN GRID -->
<section class="container grid">
  <div class="card"><img src="https://picsum.photos/400?1"></div>
  <div class="card"><img src="https://picsum.photos/400?2"></div>
  <div class="card"><img src="https://picsum.photos/400?3"></div>
  <div class="card"><img src="https://picsum.photos/400?4"></div>
  <div class="card"><img src="https://picsum.photos/400?5"></div>
  <div class="card"><img src="https://picsum.photos/400?6"></div>
</section>

<!-- FOOTER -->
<footer>
  <p>Explore top agency shots 🚀</p>
</footer>

</body>
</html>
